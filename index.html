<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Reharmonization Workspace & Academy</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f1115;
            color: #e0e6ed;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: #171a21;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.6);
        }
        h1 {
            text-align: center;
            color: #00d2d3;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #84817a;
            margin-bottom: 25px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Top Level Main App Navigation Navigation Bar */
        .main-nav {
            display: flex;
            background: #131720;
            padding: 6px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #2c3447;
            gap: 5px;
        }
        .nav-btn {
            flex: 1;
            background: transparent;
            color: #a4b0be;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.02);
        }
        .nav-btn.active {
            background: #00d2d3;
            color: #171a21;
        }

        /* View Panel Layout Management */
        .app-view {
            display: none;
        }
        .app-view.active {
            display: block;
        }

        /* Input Deck Panel Styles */
        .input-deck {
            background: #1e232e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #2c3447;
        }
        .input-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            background: #2c3447;
            color: #a4b0be;
            border: 1px solid #3d4862;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            text-align: center;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background: #3d4862;
            color: #fff;
        }
        .tab-btn.active {
            background: #00d2d3;
            color: #171a21;
            border-color: #fff;
        }
        .tab-content {
            display: none;
            background: #131720;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #2c3447;
        }
        .tab-content.active {
            display: block;
        }
        .file-label {
            display: inline-block;
            background: #2c3447;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid #3d4862;
            font-weight: 600;
        }
        .file-label:hover {
            background: #3d4862;
        }
        input[type="file"] {
            display: none;
        }
        .status-text {
            margin-top: 12px;
            font-size: 13px;
            color: #84817a;
            font-family: monospace;
        }
        .action-btn {
            background: #eb4d4b; 
            color: white; 
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
        }

        /* Timeline & Arrangement Panel Display */
        .display-deck {
            background: #1e232e;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            border-left: 5px solid #00d2d3;
        }
        .track-metadata {
            display: inline-block;
            font-size: 11px;
            background: rgba(0, 210, 211, 0.1);
            color: #00d2d3;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(0, 210, 211, 0.2);
            font-family: monospace;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .section-block {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #2c3447;
        }
        .section-header {
            font-size: 12px;
            font-weight: bold;
            color: #00d2d3;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }
        .section-type {
            background: #2c3447;
            padding: 4px 10px;
            border-radius: 4px;
            color: #fff;
        }
        
        .progression-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 12px;
            align-items: center;
        }
        @media (max-width: 900px) {
            .progression-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        .chord-pair-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #252b3a;
            border-radius: 6px;
            padding: 10px 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            position: relative;
        }
        .measure-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 9px;
            color: #4b5563;
            font-family: monospace;
        }
        .chord-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2px;
            align-items: center;
            width: 100%;
        }
        .chord-title {
            font-size: 9px;
            color: #57606f;
            text-transform: uppercase;
            font-weight: 600;
        }
        .chord-card {
            text-align: center;
            background: #2c3447;
            padding: 8px 4px;
            border-radius: 4px;
            width: 90%;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 1px solid transparent;
            transition: all 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chord-card.transformed {
            background: #10ac84;
            border-color: #1dd1a1;
            animation: flash 0.3s ease-out;
        }
        .divider-arrow {
            color: #2f3542;
            font-size: 12px;
            margin: -2px 0;
        }
        .analysis-text {
            font-size: 14px;
            color: #00d2d3;
            background: #131720;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            margin-top: 15px;
        }

        /* Matrix Grid System */
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }
        .matrix-category {
            background: #1e232e;
            padding: 18px;
            border-radius: 8px;
            border-top: 3px solid #576574;
        }
        .matrix-category h3 {
            margin-top: 0;
            color: #a4b0be;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-bottom: 1px solid #2c3447;
            padding-bottom: 5px;
        }
        .mod-btn {
            display: block;
            width: 100%;
            background: #2c3447;
            color: #dcdde1;
            border: 1px solid #3d4862;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mod-btn:hover {
            background: #3d4862;
            color: #fff;
            border-color: #00d2d3;
        }
        .mod-btn.active {
            background: #00d2d3;
            color: #171a21;
            font-weight: bold;
            border-color: #fff;
        }

        /* Theory Academy Glossary View Styles Matrix */
        .glossary-wrapper {
            background: #1e232e;
            border-radius: 8px;
            padding: 25px;
            border: 1px solid #2c3447;
        }
        .glossary-search {
            width: 100%;
            padding: 12px;
            background: #131720;
            border: 1px solid #2c3447;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 25px;
            box-sizing: border-box;
        }
        .glossary-search:focus {
            outline: none;
            border-color: #00d2d3;
        }
        .glossary-card {
            background: #131720;
            border-left: 4px solid #576574;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 15px;
            border-top: 1px solid rgba(255,255,255,0.01);
            border-right: 1px solid rgba(255,255,255,0.01);
            border-bottom: 1px solid rgba(255,255,255,0.01);
        }
        .glossary-card h4 {
            margin: 0 0 8px 0;
            color: #00d2d3;
            font-size: 16px;
            text-transform: capitalize;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .glossary-tag {
            font-size: 10px;
            text-transform: uppercase;
            background: #2c3447;
            color: #a4b0be;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }
        .glossary-def {
            margin: 0;
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        @keyframes flash {
            0% { background-color: #00d2d3; }
            100% { background-color: #10ac84; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Song Reharmonization Workspace</h1>
    <div class="subtitle">Advanced harmonic transformation lab</div>

    <div class="main-nav">
        <button class="nav-btn active" id="view-lab-btn" onclick="switchMainView('view-lab')">Lab Workspace</button>
        <button class="nav-btn" id="view-glossary-btn" onclick="switchMainView('view-glossary')">Theory Glossary</button>
    </div>

    <div id="view-lab" class="app-view active">
        <div class="input-deck">
            <div class="input-tabs">
                <button class="tab-btn active" onclick="switchInputTab('audio-tab', this)">Audio Import</button>
                <button class="tab-btn" onclick="switchInputTab('midi-tab', this)">MIDI Import</button>
                <button class="tab-btn" onclick="switchInputTab('record-tab', this)">Live Record</button>
            </div>

            <div id="audio-tab" class="tab-content active">
                <label class="file-label" for="audioFile">Choose Audio File (.wav, .mp3)</label>
                <input type="file" id="audioFile" accept="audio/wav, audio/mp3, audio/mpeg" onchange="processAudioFile()">
                <div class="status-text" id="audioStatus">No audio data loaded. System standby.</div>
            </div>

            <div id="midi-tab" class="tab-content">
                <label class="file-label" for="midiFile">Choose MIDI File (.mid)</label>
                <input type="file" id="midiFile" accept
