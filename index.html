<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song Reharmonizer — Studio UI</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #topbar {
      background: #111;
      padding: 12px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      border-bottom: 2px solid #333;
    }

    #container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      border-right: 2px solid #333;
    }

    .panel:last-child {
      border-right: none;
    }

    h2 {
      margin-top: 0;
      border-bottom: 1px solid #444;
      padding-bottom: 6px;
    }

    button {
      background: #444;
      color: #fff;
      border: none;
      padding: 10px 16px;
      margin: 6px 0;
      cursor: pointer;
      font-size: 14px;
      border-radius: 4px;
    }

    button:hover {
      background: #666;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #0f0;
    }

    pre {
      background: #111;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 4px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #reharmContent {
      background: #111;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 4px;
      margin-top: 10px;
    }

    #reharmContent .label {
      font-weight: bold;
      color: #0af;
      margin-bottom: 6px;
    }

    #reharmContent .notes {
      white-space: pre-wrap;
      margin-bottom: 12px;
    }

    #reharmContent .summary {
      background: #000;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>

<body>
  <div id="topbar">Song Reharmonizer — Studio UI</div>

  <div id="container">
    <!-- AUDIO INPUT PANEL -->
    <div class="panel" id="audio-panel">
      <h2>Audio Input</h2>

      <button id="startBtn">Start Recording</button>
      <button id="stopBtn" disabled>Stop Recording</button>

      <h3>Upload WAV File</h3>
      <input type="file" id="fileInput" accept=".wav" />

      <div id="status">Idle</div>
    </div>

    <!-- TRANSCRIBED NOTES PANEL -->
    <div class="panel" id="notes-panel">
      <h2>Transcribed Notes</h2>

      <button id="transcribeBtn">Transcribe Audio</button>

      <pre id="notesOutput">No notes yet. Record or upload audio to begin.</pre>
    </div>

    <!-- REHARMONIZER PANEL -->
    <div class="panel" id="reharm-panel">
      <h2>Reharmonizer</h2>
      <div id="reharmContent"></div>
    </div>
  </div>

  <script>
    const SERVER_URL = "https://shiny-lamp-4j6wx946j7q2q56w-5000.app.github.dev/transcribe";

    let mediaRecorder;
    let recordedChunks = [];
    let lastRecordedBlob = null;

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const fileInput = document.getElementById("fileInput");
    const statusEl = document.getElementById("status");

    const transcribeBtn = document.getElementById("transcribeBtn");
    const notesOutput = document.getElementById("notesOutput");

    startBtn.onclick = async () => {
      recordedChunks = [];
      lastRecordedBlob = null;

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        lastRecordedBlob = new Blob(recordedChunks, { type: "audio/wav" });
        statusEl.textContent = "Recording complete.";
      };

      mediaRecorder.start();
      statusEl.textContent = "Recording…";
      startBtn.disabled = true;
      stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
      startBtn.disabled = false;
      stopBtn.disabled = true;
    };

    fileInput.onchange = () => {
      const file = fileInput.files[0];
      if (file) {
        lastRecordedBlob = file;
        statusEl.textContent = "WAV file loaded.";
      }
    };

    function displayReharm(notes) {
      const reharmContent = document.getElementById("reharmContent");

      reharmContent.innerHTML = `
        <div class="label">Transcribed Notes</div>
        <div class="notes">${notes}</div>

        <div class="label">Reharm Summary</div>
        <div class="summary">
          Your transcription is ready for harmonic analysis.
          Future modules will generate functional harmony maps,
          chord-scale overlays, voicing suggestions, and MIDI exports.
        </div>
      `;
    }

    async function transcribeAndReharmonize(blob) {
      const formData = new FormData();
      formData.append("audio", blob, "audio.wav");

      notesOutput.textContent = "Transcribing… please wait.";

      try {
        const response = await fetch(SERVER_URL, {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          notesOutput.textContent = "Server error: " + response.status;
          return;
        }

        const data = await response.json();

        if (data.error) {
          notesOutput.textContent = "Transcription failed: " + data.error;
          return;
        }

        const notes = data.notes || "No notes returned.";
        notesOutput.textContent = notes;

        displayReharm(notes);
      } catch (err) {
        notesOutput.textContent = "Network error during transcription.";
      }
    }

    transcribeBtn.onclick = () => {
      if (!lastRecordedBlob) {
        notesOutput.textContent = "No audio available. Record or upload a WAV file first.";
        return;
      }
      transcribeAndReharmonize(lastRecordedBlob);
    };
  </script>

</body>
</html>
